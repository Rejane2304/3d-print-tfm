<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Cube Icon -->
  <g transform="translate(5, 10)">
    <!-- Back face -->
    <path d="M16 4 L26 9 L26 19 L16 24 L16 14 Z" fill="#1E40AF" opacity="0.7"/>
    <!-- Left face -->
    <path d="M4 9 L16 14 L16 24 L4 19 Z" fill="#1E3A8A"/>
    <!-- Front face -->
    <path d="M16 14 L26 9 L26 19 L16 24 Z" fill="#3B82F6"/>
    <!-- Top highlight -->
    <path d="M16 4 L26 9 L16 14 L4 9 Z" fill="#60A5FA"/>
    <!-- Accent dot -->
    <circle cx="26" cy="19" r="2.5" fill="#F59E0B"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(50, 0)">
    <!-- 3D text -->
    <text x="0" y="36" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#F59E0B">3D</text>
    <!-- Print text -->
    <text x="56" y="36" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="600" fill="#3B82F6">Print</text>
  </g>
  
  <!-- Accent underline - starts at 3, ends at t -->
  <rect x="50" y="44" width="130" height="2.5" rx="1.25" fill="url(#gradient)"/>
  
  <defs>
    <linearGradient id="gradient" x1="50" y1="45.25" x2="180" y2="45.25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
</svg>