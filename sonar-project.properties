# SonarQube Configuration - OPTIMIZADO para Next.js + TypeScript + Prisma
# Soluciona el problema: "analizando 'route.ts' y sus dependencias"
sonar.projectKey=3d-print-tfm
sonar.projectName=3D Print TFM

# Source code location
sonar.sources=src,scripts

# ============================================
# EXCLUSIONES CRÍTICAS - Archivos que causan HANG
# ============================================
# Estos archivos tienen tipos complejos de Prisma/Zod que bloquean el scanner
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/prisma/seed.ts,\
  **/prisma/migrations/**,\
  **/tests/**,\
  **/*.config.ts,\
  **/*.config.js,\
  **/generated/**,\
  **/.env*,\
  **/secrets/**

# ============================================
# EXCLUSIONES ESPECÍFICAS - Archivos problemáticos
# ============================================
# Archivos con tipos Prisma complejos que causan atasco
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/tests/**,\
  **/src/app/api/checkout/route.ts,\
  **/src/app/api/payments/stripe/create/route.ts,\
  **/src/app/api/payments/paypal/create/route.ts,\
  **/src/app/api/admin/analytics/route.ts,\
  **/src/app/api/admin/**/import/processor.ts,\
  **/src/app/api/admin/**/import/route.ts

# ============================================
# EXCLUSIONES DUPLICADOS
# ============================================
sonar.cpd.exclusions=\
  **/src/app/api/**/import/**,\
  **/*.test.ts

# ============================================
# TYPESCRIPT - Configuración anti-hang
# ============================================
sonar.typescript.tsconfigPath=tsconfig.json

# CRÍTICO: Desactivar type checking durante análisis
# Esto evita que SonarQube intente resolver tipos de Prisma complejos
sonar.typescript.typeCheck=false

# Ignorar node_modules en análisis de dependencias
sonar.typescript.node.modules.skip=true

# ============================================
# MEMORIA Y PERFORMANCE - Configuración agresiva
# ============================================

# Aumentar heap a 4GB (crítico para proyectos con Prisma)
sonar.javaOpts=-Xmx4096m -XX:+UseG1GC -XX:MaxGCPauseMillis=200

# Timeout para análisis de archivos (5 minutos = 300000ms)
sonar.analysis.timeout=300000

# Limitar profundidad de análisis
sonar.analysis.depth=3

# Desactivar análisis de dependencias profundo (causa el hang)
sonar.dependencyCheck.skip=true

# ============================================
# IGNORAR REGLAS ESPECÍFICAS PARA NEXT.JS
# ============================================
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignorar S100 (nombres de funciones) en archivos Next.js
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=src/app/**/page.tsx

sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e2.resourceKey=src/app/**/layout.tsx

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e3.resourceKey=src/app/**/route.ts

# ============================================
# CONFIGURACIÓN CI/CD
# ============================================
sonar.analysis.detectedCI=GitHub
sonar.analysis.mode=publish

# Encoding
sonar.sourceEncoding=UTF-8

# ============================================
# LOGGING - Para debugging
# ============================================
# Descomentar para ver qué archivos se analizan
# sonar.verbose=true
# sonar.log.level=DEBUG
