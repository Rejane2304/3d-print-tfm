# SonarQube Configuration
sonar.projectKey=3d-print-tfm
sonar.projectName=3D Print TFM

# Source code location
sonar.sources=src,scripts

# Exclude generated files and dependencies
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/prisma/seed.ts,\
  **/prisma/migrations/**,\
  **/tests/**,\
  **/*.config.ts,\
  **/*.config.js

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Disable specific rules that conflict with Next.js patterns
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignore S100 in Next.js page/layout files (Next.js requires specific naming)
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=src/app/**/page.tsx

# Ignore S100 in layout files
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e2.resourceKey=src/app/**/layout.tsx

# Ignore S100 in route files
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S100
sonar.issue.ignore.multicriteria.e3.resourceKey=src/app/**/route.ts
