# ============================================
# GITHUB BRANCH PROTECTION RULES
# Archivo de configuración para GitHub Settings
# Aplicar con: https://github.com/repository-settings/app
# O configurar manualmente en: Settings > Branches
# ============================================

repository:
  # Desactivar push directo a main (requiere PR)
  default_branch: main

  # Configuración de PRs obligatorios
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - 'Quality Gate'
          - 'Unit Tests'
          - 'Integration Tests'
          - 'Build Verification'
      enforce_admins: true
      restrictions:
        users: []
        teams: []
      allow_force_pushes: false
      allow_deletions: false
      required_linear_history: true
      required_conversation_resolution: true

  - name: develop
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
      required_status_checks:
        strict: true
        contexts:
          - 'Quality Gate'
          - 'Unit Tests'
          - 'Build Verification'
      enforce_admins: true
      allow_force_pushes: false
      allow_deletions: false

# CODEOWNERS - Quién debe aprobar cada parte del código
codeowners:
  - pattern: '*'
    owners:
      - '@rejanerodrigues'
  - pattern: '/src/app/api/**'
    owners:
      - '@rejanerodrigues'
  - pattern: '/prisma/**'
    owners:
      - '@rejanerodrigues'
  - pattern: '/tests/**'
    owners:
      - '@rejanerodrigues'
