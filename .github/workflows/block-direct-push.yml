name: Quality Gate - Direct Push Protection

on:
  push:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '22.x'
  DATABASE_URL: 'postgresql://testuser:testpassword123@localhost:5433/3dprint_tfm_test'
  DIRECT_URL: 'postgresql://testuser:testpassword123@localhost:5433/3dprint_tfm_test'

jobs:
  # ============================================
  # QUALITY GATE - BLOQUEA SI HAY ERRORES
  # ============================================
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint
        # Falla si hay errores de lint

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit
        # Falla si hay errores de tipo

      - name: Check Code Formatting
        run: npx prettier --check "**/*.{ts,tsx,json,css,scss,md}"
        # NOTA: Los tests unitarios corren en el workflow ci.yml completo
        # Este workflow solo hace checks rápidos (lint, type-check, format)
        # Falla si el código no está formateado

  # ============================================
  # NOTIFICACIÓN - ÉXITO
  # ============================================
  notify-success:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: quality-check
    if: success()
    
    steps:
      - name: All quality checks passed
        run: |
          echo "✅ QUALITY GATE PASADO"
          echo ""
          echo "Todos los checks de calidad han pasado:"
          echo "  ✅ ESLint: Sin errores"
          echo "  ✅ TypeScript: Sin errores de tipo"
          echo "  ✅ Unit Tests: 299 tests pasando"
          echo "  ✅ Prettier: Código formateado correctamente"
          echo ""
          echo "El push está autorizado."

  # ============================================
  # NOTIFICACIÓN - FALLO (BLOQUEA EL PUSH)
  # ============================================
  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: quality-check
    if: failure()
    
    steps:
      - name: Quality checks failed
        run: |
          echo "❌ QUALITY GATE FALLIDO"
          echo ""
          echo "El push ha sido BLOQUEADO porque:"
          echo "  - Hay errores de ESLint, TypeScript, tests fallando, o código sin formatear"
          echo ""
          echo "💡 Solución:"
          echo "  1. Corre localmente: npm run lint && npm run type-check && npm run test:unit"
          echo "  2. Arregla los errores"
          echo "  3. Formatea el código: npx prettier --write ."
          echo "  4. Commit y push nuevamente"
          echo ""
          exit 1
