name: Quality Gate - Direct Push Protection

on:
  push:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '22.x'
  DATABASE_URL: 'postgresql://testuser:testpassword123@localhost:5433/3dprint_tfm_test'
  DIRECT_URL: 'postgresql://testuser:testpassword123@localhost:5433/3dprint_tfm_test'

jobs:
  # ============================================
  # QUALITY GATE - BLOQUEA SI HAY ERRORES
  # ============================================
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword123
          POSTGRES_DB: 3dprint_tfm_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5433; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... attempt $i/30"
            sleep 1
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit
        # Falla si hay errores de tipo

      - name: Check Code Formatting
        run: npx prettier --check "**/*.{ts,tsx,json,css,scss,md}"
        # Falla si el código no está formateado

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
        # El build verifica TypeScript y construcción completa

  # ============================================
  # NOTIFICACIÓN - ÉXITO
  # ============================================
  notify-success:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: quality-check
    if: success()
    
    steps:
      - name: All quality checks passed
        run: |
          echo "✅ QUALITY GATE PASADO"
          echo ""
          echo "Todos los checks de calidad han pasado:"
          echo "  ✅ TypeScript: Sin errores de tipo"
          echo "  ✅ Build: Construcción exitosa"
          echo "  ✅ Prettier: Código formateado correctamente"
          echo ""
          echo "El push está autorizado."

  # ============================================
  # NOTIFICACIÓN - FALLO (BLOQUEA EL PUSH)
  # ============================================
  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: quality-check
    if: failure()
    
    steps:
      - name: Quality checks failed
        run: |
          echo "❌ QUALITY GATE FALLIDO"
          echo ""
          echo "El push ha sido BLOQUEADO porque:"
          echo "  - Hay errores de TypeScript, build fallando, o código sin formatear"
          echo ""
          echo "💡 Solución:"
          echo "  1. Corre localmente: npm run type-check && npm run build"
          echo "  2. Arregla los errores"
          echo "  3. Formatea el código: npx prettier --write ."
          echo "  4. Commit y push nuevamente"
          echo ""
          exit 1
